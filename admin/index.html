<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Modern Blog</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">ADMIN.PANEL</div>
            <a href="../" class="btn" style="text-decoration: none; background: #334155;">View Blog</a>
        </nav>

        <!-- Pre-Deployment Info -->
        <div id="auth-section" class="glass-card" style="max-width: 500px; margin: 4rem auto; text-align: center;">
            <h2 style="margin-bottom: 2rem;">Connecting to GitHub...</h2>
            <div class="status-msg" style="color: var(--text-muted); line-height: 1.6;">
                <p>The Deployment Bot is currently injecting your secure token. This takes about 60 seconds.</p>
                <p style="margin-top: 1rem; font-size: 0.875rem;">If this screen doesn't change, make sure you added the <b>BLOG_TOKEN</b> secret to your GitHub repository.</p>
            </div>
            <div style="margin-top: 2rem;" class="loader"></div>
        </div>

        <!-- Post Form Section (Hidden until Bot Injects Token) -->
        <div id="admin-content" style="display: none;">
            <div class="glass-card" style="margin-bottom: 3rem;">
                <h2 style="margin-bottom: 2rem;">Share a New Story</h2>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="post-title" placeholder="A catchy title...">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="post-content" rows="6" placeholder="Write your story here..."></textarea>
                </div>
                <div class="form-group">
                    <label>Cover Image</label>
                    <input type="file" id="post-image" accept="image/*">
                </div>
                <button id="publish-btn" class="btn">Publish to Blog</button>
                <div id="status" style="margin-top: 1rem; font-size: 0.875rem;"></div>
            </div>

            <h2 style="margin-bottom: 2rem;">Manage Recent Posts</h2>
            <div id="admin-posts" class="post-grid">
                <!-- Posts will be loaded here -->
            </div>
        </div>
    </div>

    <style>
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="../js/admin.js"></script>
</body>
</html>
